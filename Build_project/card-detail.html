<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Product Detail</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark">
    <div class="container py-5">
      <div class="row align-items-center">
        <!-- Image -->

        <div class="col-lg-6 text-center">
          <img id="productImage" class="img-fluid rounded shadow" width="450" />
        </div>

        <!-- Detail -->

        <div class="col-lg-6 text-white">
          <h1 id="productName" class="fw-bold mb-3"></h1>

          <h2 class="text-danger">$<span id="productPrice"></span></h2>

          <h5 class="text-decoration-line-through text-secondary">
            $<span id="productOldPrice"></span>
          </h5>

          <p id="productDescription" class="mt-4"></p>

          <ul class="list-group mb-4">
            <li class="list-group-item">⭐ Premium Quality</li>

            <li class="list-group-item">🚚 Free Shipping</li>

            <li class="list-group-item">🛡️ 1 Year Warranty</li>

            <li class="list-group-item">📦 In Stock</li>
          </ul>

          <div class="d-flex gap-3">
            <button class="btn btn-danger btn-lg">🛒 Buy Now</button>

            <button class="btn btn-outline-light btn-lg">❤️ Wishlist</button>
          </div>
        </div>
      </div>
    </div>

    <script src="product.js"></script>

    <script>
      // get id from URL

      const url = new URLSearchParams(window.location.search);
      const id = Number(url.get("id"));

      console.log("ID =", id);
      console.log("Products =", products);

      const product = products.find((item) => item.id === id);

      console.log("Product =", product);

      if (!product) {
        alert("Product not found!");
      } else {
        document.getElementById("productImage").src = product.image;
        document.getElementById("productName").textContent = product.name;
        document.getElementById("productPrice").textContent = product.price;
        document.getElementById("productOldPrice").textContent = product.oldPrice;
        document.getElementById("productDescription").textContent = product.description;
      }
    </script>
  </body>
</html>
